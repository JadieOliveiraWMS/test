name: 🚀 Deploy Homolog

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão (ex: 1.2.3)"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout completo para permitir criar tags
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Criar e pushar tag homolog
      - name: Criar tag homolog
        run: |
          echo "Criando tag h-${{ inputs.version }}"
          git tag h-${{ inputs.version }}
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git h-${{ inputs.version }}

      # Deploy simulado (ou você pode colocar seus comandos de deploy reais depois)
      - name: Deploy homolog
        run: |
          echo "Deployando versão h-${{ inputs.version }} em homolog"
