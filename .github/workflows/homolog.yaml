name: 🚀 Deploy Homolog

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão (ex: 1.2.3)"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout completo
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Criar tag homolog
      - name: Criar tag homolog
        run: |
          echo "Criando tag h-${{ inputs.version }}"
          git tag h-${{ inputs.version }}
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git h-${{ inputs.version }}

      # Merge develop → homolog
      - name: Merge develop → homolog
        run: |
          git checkout homolog
          git merge develop --no-ff -m "Merge automático após deploy h-${{ inputs.version }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git homolog

      # Docker (opcional: só se secrets configurados)
      - name: Login no registry
        if: ${{ secrets.REGISTRY_USER && secrets.GH_TOKEN }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build Docker
        if: ${{ secrets.REGISTRY_USER && secrets.GH_TOKEN }}
        run: |
          docker build -t ghcr.io/${{ secrets.REGISTRY_USER }}/wms-web:h-${{ inputs.version }} .

      - name: Push Docker
        if: ${{ secrets.REGISTRY_USER && secrets.GH_TOKEN }}
        run: |
          docker push ghcr.io/${{ secrets.REGISTRY_USER }}/wms-web:h-${{ inputs.version }}

      # Deploy (simulado)
      - name: Deploy homolog
        run: |
          echo "Deployando versão h-${{ inputs.version }} em homolog"
