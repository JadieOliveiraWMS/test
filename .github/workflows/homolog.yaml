name: 🚀 Deploy Homolog

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão (ex: 1.2.3)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wms-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Criar tag homolog
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag h-${{ inputs.version }}
          git push origin h-${{ inputs.version }}

      - name: Login no registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build imagem
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ secrets.REGISTRY_USER }}/${{ env.IMAGE_NAME }}:h-${{ inputs.version }} .

      - name: Push imagem
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.REGISTRY_USER }}/${{ env.IMAGE_NAME }}:h-${{ inputs.version }}

      - name: Deploy homolog
        run: |
          echo "Deployando versão h-${{ inputs.version }} em homolog"