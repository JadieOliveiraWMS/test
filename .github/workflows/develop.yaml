name: 🧪 Build (develop)

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: |
          if grep -q '"test":' package.json; then
            npm test
          else
            echo "Nenhum teste definido, pulando etapa."
          fi

      - name: Build
        run: npm run build
